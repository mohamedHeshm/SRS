<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - GOLDEN PASS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <!-- Back Button -->
        <a href="index.html" class="back-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            العودة
        </a>

        <!-- Auth Card -->
        <div class="auth-card">
            <div class="auth-header">
                <h1 id="authTitle">إنشاء حساب جديد</h1>
                <p id="authSubtitle">ابدأ رحلتك مع - GOLDEN PASS</p>
            </div>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="businessName">الاسم التجاري</label>
                    <input 
                        type="text" 
                        id="businessName" 
                        name="businessName" 
                        placeholder="اسم شركتك"
                        required
                    >
                    <span class="error-message" id="businessNameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">رقم الهاتف</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="+20 123 456 7890"
                    >
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="subdomain">اسم النطاق الفرعي</label>
                    <div class="subdomain-input">
                        <input 
                            type="text" 
                            id="subdomain" 
                            name="subdomain" 
                            placeholder="mycompany"
                            required
                        >
                        <span class="domain-suffix">.businesspro.app</span>
                    </div>
                    <span class="error-message" id="subdomainError"></span>
                    <small>سيكون عنوان شركتك: yourcompany.businesspro.app</small>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <div class="password-input">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="أدخل كلمة مرور قوية"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                    <small>استخدم 8 أحرف على الأقل</small>
                </div>

                <button type="submit" class="btn-large" id="signupBtn">
                    <span class="btn-text">ابدأ الاستخدام مجانًا</span>
                    <span class="btn-loader" style="display: none;">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-divider">
                    <span>أو</span>
                </div>

                <button type="button" class="btn-secondary" onclick="toggleForms()">
                    لديك حساب بالفعل؟ سجل دخول
                </button>
            </form>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form hidden">
                <div class="form-group">
                    <label for="loginEmail">البريد الإلكتروني</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                    <span class="error-message" id="loginEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">كلمة المرور</label>
                    <div class="password-input">
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password" 
                            placeholder="أدخل كلمة المرور"
                            required
                        >
                        <button type="button" class="toggle-password" id="toggleLoginPassword">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <button type="submit" class="btn-large" id="loginBtn">
                    <span class="btn-text">تسجيل الدخول</span>
                    <span class="btn-loader" style="display: none;">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-divider">
                    <span>أو</span>
                </div>

                <button type="button" class="btn-secondary" onclick="toggleForms()">
                    حساب جديد؟ أنشئ واحدًا الآن
                </button>
            </form>
        </div>

        <!-- Decoration -->
        <div class="auth-decoration">
            <div class="gradient-orb"></div>
            <div class="gradient-orb secondary"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
